{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Billing Tracker</h2>
  <form method="post" enctype="multipart/form-data">
    {% if require_pw %}
      <label>Team Password <input type="password" name="password" required></label>
    {% endif %}
    <label>Select PDFs (multiple):
      <input type="file" name="pdfs" accept="application/pdf" multiple required>
    </label>
    <p><button type="submit">Generate Excel</button></p>
  </form>
</div>
{% endblock %}
