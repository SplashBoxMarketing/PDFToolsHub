{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Billing Tracker (no upload)</h2>
  <p>Select PDFs. We’ll count pages in your browser and only send the counts to the server.</p>

  <label>Select PDFs (multiple):
    <input id="pdfs" type="file" accept="application/pdf" multiple>
  </label>

  <p>
    <button id="goBtn" type="button">Generate Excel</button>
  </p>

  <div id="status" style="white-space:pre; font-family:monospace;"></div>
</div>

<!-- PDF.js with fallback -->
<script>
  (function loadPdfJs(primary, fallback) {
    function setWorker() {
      if (!window.pdfjsLib) return false;
      window.pdfjsLib.GlobalWorkerOptions.workerSrc = primary.replace("pdf.min.js", "pdf.worker.min.js");
      return true;
    }
    function inject(src, onload) {
      var s = document.createElement("script");
      s.src = src; s.async = true; s.crossOrigin = "anonymous";
      s.onload = onload; s.onerror = function () {
        // Try fallback if primary fails
        if (src === primary && fallback) inject(fallback, function () {
          // set worker using fallback URL
          if (window.pdfjsLib) {
            window.pdfjsLib.GlobalWorkerOptions.workerSrc = fallback.replace("pdf.min.js", "pdf.worker.min.js");
          }
        });
        else {
          // Surface a friendly message and disable the button
          var st = document.getElementById("status"), btn = document.getElementById("goBtn");
          if (st) st.textContent = "ERROR: PDF.js failed to load. Please check your network or try again.";
          if (btn) btn.disabled = true;
        }
      };
      document.head.appendChild(s);
    }

    // Primary: jsDelivr; Fallback: cdnjs (versions known-good with globals)
    inject(
      "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js",
      function () { setWorker() || (function(){
        // If pdfjsLib is still missing after onload, try the fallback
        inject("https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js", setWorker);
      })(); }
    );
  })();

const $ = (s) => document.querySelector(s);
const statusEl = document.getElementById("status");
const goBtn = document.getElementById("goBtn");
const input = document.getElementById("pdfs");

async function countPages(file) {
  statusEl.textContent += `Reading: ${file.name}\n`;
  const buf = await file.arrayBuffer();
  const loadingTask = window.pdfjsLib.getDocument({ data: buf });
  const pdf = await loadingTask.promise;
  const n = pdf.numPages;
  statusEl.textContent += `  Pages: ${n}\n`;
  pdf.destroy?.();
  return n;
}

goBtn.onclick = async () => {
  const files = Array.from(input.files || []);
  if (!files.length) {
    alert("Please select PDFs first.");
    return;
  }
  goBtn.disabled = true;
  statusEl.textContent = "Counting pages...\n";

  const rows = [];
  for (const f of files) {
    try {
      const n = await countPages(f);
      rows.push({
        "Filename": f.name,
        "Page Count": n,
        "Complete Y/N": "",
        "Note": ""
      });
    } catch (e) {
      statusEl.textContent += `  ERROR: ${f.name}: ${e}\n`;
      rows.push({
        "Filename": f.name,
        "Page Count": "ERROR",
        "Complete Y/N": "",
        "Note": "Failed to read"
      });
    }
  }

  statusEl.textContent += "\nUploading counts to generate Excel...\n";
  const resp = await fetch("/billtracker-json", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ rows })
  });
  if (!resp.ok) {
    const text = await resp.text();
    statusEl.textContent += `Server error: ${resp.status}\n${text}\n`;
    goBtn.disabled = false;
    return;
  }
  // Download the Excel
  const blob = await resp.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "pdf_page_counts.xlsx";
  a.click();
  URL.revokeObjectURL(url);
  statusEl.textContent += "Done.\n";
  goBtn.disabled = false;
};
</script>
{% endblock %}
