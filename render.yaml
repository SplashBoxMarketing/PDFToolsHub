services:
  - type: web
    name: pdf-tools
    env: python
    buildCommand: >
      pip install --upgrade pip setuptools wheel &&
      PIP_ONLY_BINARY=:all: pip install PyMuPDF==1.24.10 pandas==2.2.3 &&
      pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120

