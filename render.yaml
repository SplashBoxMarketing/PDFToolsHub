services:
  - type: web
    name: pdf-tools
    env: python
    buildCommand: apt-get install -y tesseract-ocr poppler-utils && pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: APP_PASSWORD
        sync: false   # you'll set the actual password in Render's dashboard
